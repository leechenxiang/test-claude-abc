<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>可爱贪食蛇</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #fce4ec;
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            color: #c2185b;
            overflow: hidden;
        }
        .game-wrapper {
            display: flex;
            gap: 30px;
            align-items: flex-start;
            padding: 20px;
        }
        .left-area {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .game-title {
            font-size: 32px;
            font-weight: bold;
            color: #880e4f;
            margin-bottom: 15px;
            text-shadow: 2px 2px 0 #f8bbd0;
            letter-spacing: 4px;
        }
        .game-board {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(194, 24, 86, 0.3), inset 0 0 0 4px #f48fb1;
            background: #f8bbd0;
        }
        canvas {
            display: block;
            background: #f8bbd0;
        }
        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 18px;
            width: 180px;
        }
        .panel-card {
            background: #ffffff;
            border-radius: 14px;
            padding: 18px;
            box-shadow: 0 4px 16px rgba(194, 24, 86, 0.15);
            border: 2px solid #f8bbd0;
        }
        .panel-card h3 {
            font-size: 13px;
            color: #f06292;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .panel-card .value {
            font-size: 28px;
            font-weight: bold;
            color: #c2185b;
        }
        .panel-card .high-score {
            font-size: 20px;
            font-weight: bold;
            color: #f9a825;
        }
        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .btn {
            padding: 12px 8px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }
        .btn-primary {
            background: #f06292;
            color: #fff;
            box-shadow: 0 4px 0 #d81b60;
        }
        .btn-primary:hover {
            background: #e91e63;
            transform: translateY(2px);
            box-shadow: 0 2px 0 #d81b60;
        }
        .btn-primary:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #d81b60;
        }
        .btn-primary:disabled {
            background: #f8bbd0;
            color: #f8bbd0;
            box-shadow: 0 4px 0 #f8bbd0;
            cursor: not-allowed;
            transform: none;
        }
        .btn-accent {
            background: #ef5350;
            color: #fff;
            box-shadow: 0 4px 0 #c62828;
        }
        .btn-accent:hover {
            background: #e53935;
            transform: translateY(2px);
            box-shadow: 0 2px 0 #c62828;
        }
        .btn-accent:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #c62828;
        }
        .controls-info {
            font-size: 12px;
            color: #f48fb1;
            line-height: 2;
        }
        .controls-info span {
            display: inline-block;
            background: #fce4ec;
            color: #c2185b;
            padding: 2px 8px;
            border-radius: 6px;
            font-weight: bold;
            margin-right: 4px;
            border: 1px solid #f8bbd0;
            min-width: 24px;
            text-align: center;
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(136, 14, 79, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        .overlay h2 {
            font-size: 36px;
            color: #fff;
            margin-bottom: 12px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .overlay p {
            font-size: 16px;
            color: #f8bbd0;
            margin-bottom: 24px;
        }
        .overlay .score-display {
            font-size: 48px;
            color: #ffeb3b;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .hidden {
            display: none !important;
        }
        .speed-label {
            font-size: 12px;
            color: #f48fb1;
            margin-top: 4px;
        }
        /* 移动端适配 */
        @media (max-width: 600px) {
            .game-wrapper {
                flex-direction: column;
                align-items: center;
                gap: 16px;
            }
            .side-panel {
                width: 100%;
                max-width: 360px;
            }
            .game-title {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <div class="left-area">
            <h1 class="game-title">🐍 可爱贪食蛇</h1>
            <div class="game-board">
                <canvas id="game" width="400" height="400"></canvas>
                <div id="startOverlay" class="overlay">
                    <h2>🐍 可爱贪食蛇</h2>
                    <p>点击开始，帮小蛇吃到美味的香蕉吧！</p>
                    <button class="btn btn-primary" id="overlayStartBtn" style="width: 160px; font-size: 16px;">开始游戏</button>
                </div>
                <div id="gameOverOverlay" class="overlay hidden">
                    <h2>哎呀，撞到了！</h2>
                    <div class="score-display" id="finalScore">0</div>
                    <p>最终得分</p>
                    <button class="btn btn-primary" id="overlayRestartBtn" style="width: 160px; font-size: 16px;">再来一局</button>
                </div>
                <div id="pauseOverlay" class="overlay hidden">
                    <h2>⏸ 暂停中</h2>
                    <p>按 P 或点击继续按钮恢复游戏</p>
                </div>
            </div>
        </div>
        <div class="side-panel">
            <div class="panel-card">
                <h3>🍌 当前得分</h3>
                <div class="value" id="score">0</div>
            </div>
            <div class="panel-card">
                <h3>🏆 最高纪录</h3>
                <div class="high-score" id="highScore">0</div>
            </div>
            <div class="panel-card">
                <h3>🍌 吃了几个</h3>
                <div class="value" id="bananas">0</div>
                <div class="speed-label" id="speedLabel">速度: 正常</div>
            </div>
            <div class="btn-group">
                <button class="btn btn-primary" id="startBtn">开始游戏</button>
                <button class="btn btn-primary" id="restartBtn">重新开始</button>
                <button class="btn btn-accent" id="pauseBtn" disabled>暂停</button>
            </div>
            <div class="panel-card">
                <h3>🎮 操作说明</h3>
                <div class="controls-info">
                    <span>↑</span> 向上移动<br>
                    <span>↓</span> 向下移动<br>
                    <span>←</span> 向左移动<br>
                    <span>→</span> 向右移动<br>
                    <span>P</span> 暂停 / 继续<br>
                    <span>空格</span> 快速开始
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');

        const GRID_SIZE = 20;
        const TILE_COUNT = canvas.width / GRID_SIZE;

        let snake = [];
        let food = {};
        let direction = { x: 0, y: 0 };
        let nextDirection = { x: 0, y: 0 };
        let score = 0;
        let bananasEaten = 0;
        let highScore = parseInt(localStorage.getItem('snakeHighScore')) || 0;
        let gameLoop = null;
        let isGameOver = false;
        let isPaused = false;
        let isGameStarted = false;
        let speed = 150;
        let lastRenderTime = 0;
        let particles = [];

        // 蛇的颜色配置（可爱红色系）
        const SNAKE_COLORS = {
            head: '#e53935',
            headLight: '#ef5350',
            body: '#f44336',
            bodyLight: '#ef9a9a',
            pattern: '#ffcdd2',
            eye: '#fff',
            pupil: '#1a1a2e',
            cheek: '#ff8a80'
        };

        // 食物颜色（香蕉）
        const FOOD_COLORS = {
            banana: '#ffeb3b',
            bananaLight: '#fff176',
            bananaDark: '#fbc02d',
            tip: '#5d4037',
            shine: '#fff9c4'
        };

        document.getElementById('highScore').textContent = highScore;

        function initGame() {
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            bananasEaten = 0;
            speed = 150;
            isGameOver = false;
            isPaused = false;
            isGameStarted = true;
            particles = [];
            spawnFood();
            updateUI();
            updateButtons();
            document.getElementById('startOverlay').classList.add('hidden');
            document.getElementById('gameOverOverlay').classList.add('hidden');
            document.getElementById('pauseOverlay').classList.add('hidden');
            lastRenderTime = performance.now();
            gameLoop = requestAnimationFrame(gameUpdate);
        }

        function spawnFood() {
            let valid = false;
            while (!valid) {
                food = {
                    x: Math.floor(Math.random() * TILE_COUNT),
                    y: Math.floor(Math.random() * TILE_COUNT)
                };
                valid = !snake.some(seg => seg.x === food.x && seg.y === food.y);
            }
        }

        function update(currentTime) {
            if (isGameOver || isPaused || !isGameStarted) return;

            const deltaTime = currentTime - lastRenderTime;

            if (deltaTime >= speed) {
                direction = { ...nextDirection };
                moveSnake();
                lastRenderTime = currentTime;
            }

            updateParticles(deltaTime);
            draw();
            gameLoop = requestAnimationFrame(gameUpdate);
        }

        function gameUpdate(currentTime) {
            update(currentTime);
        }

        function moveSnake() {
            const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

            // 撞墙检测
            if (head.x < 0 || head.x >= TILE_COUNT || head.y < 0 || head.y >= TILE_COUNT) {
                gameOver();
                return;
            }

            // 撞自己检测
            if (snake.some(seg => seg.x === head.x && seg.y === head.y)) {
                gameOver();
                return;
            }

            snake.unshift(head);

            // 吃食物
            if (head.x === food.x && head.y === food.y) {
                score += 10 + Math.floor(bananasEaten / 5) * 5;
                bananasEaten++;
                spawnFood();
                createExplosion(head.x * GRID_SIZE + GRID_SIZE / 2, head.y * GRID_SIZE + GRID_SIZE / 2);

                // 加速
                if (speed > 60) {
                    speed = Math.max(60, 150 - bananasEaten * 3);
                }

                // 更新最高分
                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('snakeHighScore', highScore);
                }

                updateUI();
            } else {
                snake.pop();
            }
        }

        function createExplosion(x, y) {
            for (let i = 0; i < 8; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 4,
                    vy: (Math.random() - 0.5) * 4,
                    life: 1,
                    color: Math.random() > 0.5 ? '#ff867f' : '#ffca28',
                    size: Math.random() * 4 + 2
                });
            }
        }

        function updateParticles(dt) {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= dt / 500;
                if (p.life <= 0) {
                    particles.splice(i, 1);
                }
            }
        }

        function draw() {
            // 背景
            ctx.fillStyle = '#f8bbd0';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制棋盘格纹理
            for (let x = 0; x < TILE_COUNT; x++) {
                for (let y = 0; y < TILE_COUNT; y++) {
                    if ((x + y) % 2 === 0) {
                        ctx.fillStyle = 'rgba(255,255,255,0.15)';
                        ctx.fillRect(x * GRID_SIZE, y * GRID_SIZE, GRID_SIZE, GRID_SIZE);
                    }
                }
            }

            // 绘制食物（可爱香蕉）
            drawBanana(food.x * GRID_SIZE, food.y * GRID_SIZE);

            // 绘制蛇
            snake.forEach((seg, index) => {
                drawSnakeSegment(seg.x * GRID_SIZE, seg.y * GRID_SIZE, index);
            });

            // 绘制粒子
            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;
        }

        function drawSnakeSegment(x, y, index) {
            const isHead = index === 0;
            const size = GRID_SIZE - 1;
            const padding = 0.5;

            if (isHead) {
                // 头部 —— 圆滚滚可爱风格
                const cx = x + GRID_SIZE / 2;
                const cy = y + GRID_SIZE / 2;
                const radius = size / 2 + 1;

                // 头部阴影
                ctx.fillStyle = 'rgba(0,0,0,0.1)';
                ctx.beginPath();
                ctx.arc(cx + 1, cy + 2, radius, 0, Math.PI * 2);
                ctx.fill();

                // 头部主体
                ctx.fillStyle = SNAKE_COLORS.head;
                ctx.beginPath();
                ctx.arc(cx, cy, radius, 0, Math.PI * 2);
                ctx.fill();

                // 头部高光
                ctx.fillStyle = SNAKE_COLORS.headLight;
                ctx.beginPath();
                ctx.arc(cx - 2, cy - 2, radius * 0.5, 0, Math.PI * 2);
                ctx.fill();

                // 腮红
                ctx.fillStyle = SNAKE_COLORS.cheek;
                ctx.beginPath();
                ctx.arc(cx - 5, cy + 3, 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(cx + 5, cy + 3, 3, 0, Math.PI * 2);
                ctx.fill();

                // 根据方向绘制眼睛
                drawEyes(cx, cy);

                // 舌头（偶尔伸出）
                if (Math.floor(performance.now() / 300) % 4 === 0) {
                    drawTongue(cx, cy);
                }
            } else {
                // 身体 —— 圆角矩形，带可爱纹理
                const progress = index / snake.length;
                const bodyColor = index % 2 === 0 ? SNAKE_COLORS.body : SNAKE_COLORS.bodyLight;

                // 身体阴影
                ctx.fillStyle = 'rgba(0,0,0,0.08)';
                roundRect(x + padding + 1, y + padding + 2, size, size, 6);
                ctx.fill();

                // 身体主体
                ctx.fillStyle = bodyColor;
                roundRect(x + padding, y + padding, size, size, 6);
                ctx.fill();

                // 身体纹理（小圆点）
                ctx.fillStyle = SNAKE_COLORS.pattern;
                ctx.beginPath();
                ctx.arc(x + GRID_SIZE / 2, y + GRID_SIZE / 2, 2.5, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function drawEyes(cx, cy) {
            let eyeOffsetX = 0, eyeOffsetY = 0;
            if (direction.x === 1) eyeOffsetX = 2;
            if (direction.x === -1) eyeOffsetX = -2;
            if (direction.y === 1) eyeOffsetY = 2;
            if (direction.y === -1) eyeOffsetY = -2;

            const eyeDist = 4;
            const eyeY = cy - 3 + eyeOffsetY;

            // 左眼白
            ctx.fillStyle = SNAKE_COLORS.eye;
            ctx.beginPath();
            ctx.arc(cx - eyeDist + eyeOffsetX, eyeY, 4, 0, Math.PI * 2);
            ctx.fill();
            // 右眼白
            ctx.beginPath();
            ctx.arc(cx + eyeDist + eyeOffsetX, eyeY, 4, 0, Math.PI * 2);
            ctx.fill();

            // 左瞳孔
            ctx.fillStyle = SNAKE_COLORS.pupil;
            ctx.beginPath();
            ctx.arc(cx - eyeDist + eyeOffsetX + (direction.x * 1.5), eyeY + (direction.y * 1.5), 2.5, 0, Math.PI * 2);
            ctx.fill();
            // 右瞳孔
            ctx.beginPath();
            ctx.arc(cx + eyeDist + eyeOffsetX + (direction.x * 1.5), eyeY + (direction.y * 1.5), 2.5, 0, Math.PI * 2);
            ctx.fill();

            // 眼神高光
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(cx - eyeDist + eyeOffsetX - 1, eyeY - 1.5, 1.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(cx + eyeDist + eyeOffsetX - 1, eyeY - 1.5, 1.5, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawTongue(cx, cy) {
            ctx.strokeStyle = '#e91e63';
            ctx.lineWidth = 2;
            ctx.lineCap = 'round';

            let tx = cx, ty = cy + 6;
            if (direction.x === 1) { tx = cx + 8; ty = cy; }
            if (direction.x === -1) { tx = cx - 8; ty = cy; }
            if (direction.y === -1) { tx = cx; ty = cy - 8; }

            ctx.beginPath();
            ctx.moveTo(cx + direction.y * 3, cy + direction.x * 3);
            ctx.lineTo(tx, ty);
            ctx.stroke();

            // 舌头分叉
            ctx.beginPath();
            ctx.moveTo(tx, ty);
            ctx.lineTo(tx - direction.y * 3 + direction.x * 3, ty - direction.x * 3 + direction.y * 3);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(tx, ty);
            ctx.lineTo(tx + direction.y * 3 + direction.x * 3, ty + direction.x * 3 + direction.y * 3);
            ctx.stroke();
        }

        function drawBanana(x, y) {
            const cx = x + GRID_SIZE / 2;
            const cy = y + GRID_SIZE / 2;
            const size = GRID_SIZE - 4;

            // 阴影
            ctx.fillStyle = 'rgba(0,0,0,0.08)';
            ctx.beginPath();
            ctx.ellipse(cx + 1, cy + 2, size / 2, size / 3.5, Math.PI / 6, 0, Math.PI * 2);
            ctx.fill();

            // 香蕉主体（月牙形）
            ctx.fillStyle = FOOD_COLORS.banana;
            ctx.beginPath();
            ctx.ellipse(cx, cy, size / 2, size / 3.5, Math.PI / 6, 0, Math.PI * 2);
            ctx.fill();

            // 香蕉中间深色线条
            ctx.strokeStyle = FOOD_COLORS.bananaDark;
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(cx - size / 3, cy + 2);
            ctx.quadraticCurveTo(cx, cy + 5, cx + size / 3, cy - 1);
            ctx.stroke();

            // 香蕉高光
            ctx.fillStyle = FOOD_COLORS.bananaLight;
            ctx.beginPath();
            ctx.ellipse(cx - 1, cy - 2, size / 3, size / 6, Math.PI / 6, 0, Math.PI * 2);
            ctx.fill();

            // 顶部尖端
            ctx.fillStyle = FOOD_COLORS.tip;
            ctx.beginPath();
            ctx.ellipse(cx - size / 2 + 1, cy + size / 4, 2, 1.5, -Math.PI / 3, 0, Math.PI * 2);
            ctx.fill();

            // 底部尖端
            ctx.beginPath();
            ctx.ellipse(cx + size / 2 - 1, cy - size / 4, 2, 1.5, -Math.PI / 3, 0, Math.PI * 2);
            ctx.fill();

            // 小高光点
            ctx.fillStyle = FOOD_COLORS.shine;
            ctx.beginPath();
            ctx.arc(cx - 3, cy - 3, 1.5, 0, Math.PI * 2);
            ctx.fill();
        }

        function roundRect(x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
        }

        function gameOver() {
            isGameOver = true;
            isGameStarted = false;
            cancelAnimationFrame(gameLoop);
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverOverlay').classList.remove('hidden');
            document.getElementById('highScore').textContent = highScore;
            updateButtons();
        }

        function togglePause() {
            if (!isGameStarted || isGameOver) return;
            isPaused = !isPaused;
            document.getElementById('pauseOverlay').classList.toggle('hidden', !isPaused);
            updateButtons();
            if (!isPaused) {
                lastRenderTime = performance.now();
                gameLoop = requestAnimationFrame(gameUpdate);
            }
        }

        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('bananas').textContent = bananasEaten;
            document.getElementById('highScore').textContent = highScore;

            let speedText = '速度: 正常';
            if (speed < 80) speedText = '速度: 飞快';
            else if (speed < 100) speedText = '速度: 很快';
            else if (speed < 130) speedText = '速度: 较快';
            document.getElementById('speedLabel').textContent = speedText;
        }

        function updateButtons() {
            const startBtn = document.getElementById('startBtn');
            const pauseBtn = document.getElementById('pauseBtn');

            if (!isGameStarted || isGameOver) {
                startBtn.disabled = false;
                pauseBtn.disabled = true;
                pauseBtn.textContent = '暂停';
            } else if (isPaused) {
                startBtn.disabled = true;
                pauseBtn.disabled = false;
                pauseBtn.textContent = '继续';
            } else {
                startBtn.disabled = true;
                pauseBtn.disabled = false;
                pauseBtn.textContent = '暂停';
            }
        }

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (e.key === ' ' && !isGameStarted) {
                e.preventDefault();
                initGame();
                return;
            }

            if (!isGameStarted || isGameOver) return;

            switch (e.key) {
                case 'ArrowUp':
                    e.preventDefault();
                    if (direction.y === 0) nextDirection = { x: 0, y: -1 };
                    break;
                case 'ArrowDown':
                    e.preventDefault();
                    if (direction.y === 0) nextDirection = { x: 0, y: 1 };
                    break;
                case 'ArrowLeft':
                    e.preventDefault();
                    if (direction.x === 0) nextDirection = { x: -1, y: 0 };
                    break;
                case 'ArrowRight':
                    e.preventDefault();
                    if (direction.x === 0) nextDirection = { x: 1, y: 0 };
                    break;
                case 'p':
                case 'P':
                    togglePause();
                    break;
            }
        });

        // 按钮事件
        document.getElementById('startBtn').addEventListener('click', initGame);
        document.getElementById('overlayStartBtn').addEventListener('click', initGame);
        document.getElementById('restartBtn').addEventListener('click', initGame);
        document.getElementById('overlayRestartBtn').addEventListener('click', initGame);
        document.getElementById('pauseBtn').addEventListener('click', togglePause);

        // 初始绘制
        updateButtons();
        draw();
    </script>
</body>
</html>
